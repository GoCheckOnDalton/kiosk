<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ICT Desk · Dalton Den Haag</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --open-a:  #ffe000;
      --open-b:  #799f0c;
      --clos-a:  #ff512f;
      --clos-b:  #dd2476;
      --glass:   rgba(0,0,0,0.22);
      --border:  rgba(255,255,255,0.14);
      --font:    'Barlow Condensed', 'Arial Narrow', sans-serif;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    html {
      height: 100%;
    }
    body {
      height: 100%; overflow: hidden;
      font-family: var(--font);
      display: flex;
      flex-direction: column;
    }
    input, textarea, button { font-family: var(--font); }

    /* ── Background ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      transition: background 1s ease;
    }
    body.status-open   #bg { background: linear-gradient(145deg, var(--open-a), var(--open-b)); }
    body.status-closed #bg { background: linear-gradient(145deg, var(--clos-a), var(--clos-b)); }
    #bg::before, #bg::after {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(100px); opacity: 0.28;
      animation: blob 11s ease-in-out infinite alternate;
    }
    #bg::before { width: 60vw; height: 60vw; top: -20vw; left: -20vw; background: rgba(255,255,255,0.28); }
    #bg::after  { width: 50vw; height: 50vw; bottom: -15vw; right: -15vw; background: rgba(0,0,0,0.22); animation-delay: -5s; }
    @keyframes blob { from { transform: scale(1); } to { transform: scale(1.12) translate(4vw,3vh); } }

    @keyframes bg-pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
    body.has-unread #bg { animation: bg-pulse 5s ease-in-out infinite; }

    /* ── School label — triple-tap → admin (invisible tap zone) ── */
    #school-label {
      position: relative; z-index: 2;
      height: 32px; flex-shrink: 0;
      cursor: default;
    }

    /* ── Status word — full-width, top ── */
    #status-word-wrap {
      position: relative; z-index: 2;
      flex-shrink: 0;
      display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden; /* prevent horizontal bleed */
      padding: 0;
      line-height: 1;
    }

    #status-word {
      font-family: 'Bebas Neue', var(--font);
      font-size: min(15vw, 16vh);
      letter-spacing: 0.28em;
      margin-right: -0.28em;
      color: #fff;
      line-height: 0.88;
      text-shadow: 0 6px 48px rgba(0,0,0,0.30);
      transition: letter-spacing 0.6s ease, margin-right 0.6s ease;
      white-space: nowrap;
    }
    body.status-open #status-word {
      letter-spacing: 1.05em;
      margin-right: -1.05em;
      color: #1e2d00;
      text-shadow: 0 4px 24px rgba(255,255,255,0.18);
    }

    /* ── Slider row — slider only ── */
    #slider-row {
      position: relative; z-index: 2;
      flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: stretch;
      padding: 0.4rem 2rem 0rem;
      gap: 0.5rem;
    }

    /* ── 2-column grid ── */
    #layout {
      position: relative; z-index: 1;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    /* ── LEFT panel — form, bottom-aligned ── */
    #left-panel {
      align-self: end;
      display: flex; flex-direction: column;
      padding: 0.8rem 1.2rem 1.2rem;
      background: var(--glass);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      height: clamp(200px, 40vh, 380px);
      overflow: hidden;
    }

    /* form section fills space when GESLOTEN */
    #form-section {
      display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-height: 0;
    }

    #left-title {
      font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      letter-spacing: 0.14em; color: #fff; flex-shrink: 0;
    }

    /* OPEN welcome — centered in same panel height */
    #open-welcome {
      display: none; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.8rem; text-align: center;
    }
    body.status-open #open-welcome { display: flex; }
    #open-welcome-text {
      font-size: clamp(1.7rem, 3.4vw, 2.6rem);
      letter-spacing: 0.16em; color: #fff; line-height: 1.2;
    }
    #open-welcome-emoji { font-size: 5rem; line-height: 1; }

    #msg-form { display: flex; flex-direction: column; gap: 0.4rem; }

    #msg-form input,
    #msg-form textarea {
      background: rgba(255,255,255,0.14);
      border: 1.5px solid rgba(255,255,255,0.26);
      border-radius: 12px; padding: 0.5rem 0.85rem;
      color: #fff; font-size: 0.9rem; letter-spacing: 0.05em;
      min-height: 38px;
      transition: border-color 0.2s, background 0.2s;
      user-select: text;
    }
    #msg-form input::placeholder,
    #msg-form textarea::placeholder { color: rgba(255,255,255,0.40); }
    #msg-form input:focus,
    #msg-form textarea:focus {
      border-color: rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.20); outline: none;
    }
    #f-bericht { height: clamp(40px, 5vh, 70px); resize: none; }

    #f-submit {
      padding: 0.6rem; min-height: 40px;
      background-image: linear-gradient(to right, #ED4264 0%, #FFEDBC 51%, #ED4264 100%);
      background-size: 200% auto; background-position: left center;
      color: #fff;
      font-size: 1rem; letter-spacing: 0.14em;
      border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 0 16px rgba(0,0,0,0.25);
      transition: background-position 0.5s, transform 0.12s;
    }
    #f-submit:hover  { background-position: right center; }
    #f-submit:active { transform: scale(0.94); }

    @keyframes flash {
      0%,100%{filter:brightness(1)} 25%{filter:brightness(1.5)}
      50%{filter:brightness(0.78)} 75%{filter:brightness(1.35)}
    }
    body.flashing #bg { animation: flash 0.5s ease 3; }

    /* ── SPARK animation ── */
    @property --spark-angle {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }
    @keyframes spark-rotate { to { --spark-angle: 360deg; } }

    /* ── CHUNKY SLIDER ── */
    #status-slider { flex: 1; min-width: 0; }

    #sl-track {
      position: relative;
      width: 100%; height: min(380px, 36vh);
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 26px;
      border: 2px solid rgba(255,255,255,0.16);
      /* no overflow:hidden — needed for glow to bleed out */
    }

    /* Knob: chunky rectangle */
    #sl-knob {
      position: absolute;
      top: 8px; left: 8px;
      width: calc(65% - 8px);
      height: calc(100% - 16px);
      background: rgba(255,255,255,0.95);
      border-radius: 19px;
      cursor: grab; touch-action: none;
      isolation: isolate;              /* stacking context for sparks */
      display: flex; align-items: center; justify-content: center;
      transition: left 0.42s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.6s ease;
      box-shadow: 0 6px 24px rgba(0,0,0,0.30);
    }
    #sl-knob.dragging { transition: none; cursor: grabbing; }
    body.status-open #sl-knob {
      left: calc(35% + 0px);
      background: rgba(240,255,245,0.97);
    }

    #sl-knob-icon {
      font-size: 3.2rem; line-height: 1;
      color: rgba(0,0,0,0.30);
      pointer-events: none;
      position: relative; z-index: 2;
    }

    /* GREEN glow ring around knob when OPEN — pulsing halo, no rotation */
    @keyframes knob-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 3px rgba(74,222,128,0.90),
          0 0 14px 5px rgba(74,222,128,0.55),
          0 0 32px 10px rgba(74,222,128,0.28),
          0 0 56px 18px rgba(134,239,172,0.14);
      }
      50% {
        box-shadow:
          0 0 0 4px rgba(134,239,172,1.00),
          0 0 22px 8px rgba(74,222,128,0.75),
          0 0 48px 16px rgba(74,222,128,0.40),
          0 0 80px 28px rgba(187,247,208,0.22);
      }
    }
    body.status-open #sl-knob {
      animation: knob-pulse 2.4s ease-in-out infinite;
    }

    /* ── RIGHT panel — messages, same fixed height as left panel ── */
    #right-panel {
      align-self: end;
      display: flex; flex-direction: column;
      padding: 0.8rem 1.2rem 1.2rem;
      background: var(--glass);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      gap: 0.6rem;
      overflow: hidden;
      height: clamp(200px, 40vh, 380px);
    }
    body.status-open #right-panel { display: none; }

    /* ── OPEN full-screen welcome ── */
    #open-screen {
      display: none;
      flex: 1; min-height: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 0.4rem;
      position: relative; z-index: 1;
      padding: 0.4rem 1.5rem 0.5rem;
    }

    /* ── Step Sequencer ── */
    #seq-area { display: flex; flex-direction: column; gap: 0.32rem; flex-shrink: 0; }
    #seq-transport { display: flex; flex-direction: row; align-items: center; gap: 0.65rem; }
    #seq-play {
      padding: 0.36rem 1.1rem;
      background-image: linear-gradient(to right, #1CD8D2 0%, #93EDC7 51%, #1CD8D2 100%);
      background-size: 200% auto; background-position: left center;
      border: none; border-radius: 8px; color: #fff;
      font-family: var(--font); font-size: 1rem; letter-spacing: 0.10em;
      cursor: pointer; transition: background-position 0.5s, transform 0.08s;
    }
    #seq-play:hover  { background-position: right center; }
    #seq-play.playing { background-image: linear-gradient(to right, #ED4264 0%, #FFEDBC 51%, #ED4264 100%); }
    #seq-play:active { transform: scale(0.93); }
    #seq-bpm-wrap {
      display: flex; align-items: center; gap: 0.32rem;
      font-family: var(--font); color: rgba(255,255,255,0.85);
    }
    #seq-bpm-val { font-size: 1.1rem; font-weight: 700; min-width: 2.5ch; text-align: center; }
    .seq-lbl { font-size: 0.68rem; letter-spacing: 0.18em; color: rgba(255,255,255,0.38); }
    .seq-ctrl-btn {
      width: 26px; height: 26px; border-radius: 6px;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.22);
      color: #fff; font-size: 1rem; line-height: 1; cursor: pointer; padding: 0;
      transition: background 0.10s;
    }
    .seq-ctrl-btn:hover { background: rgba(255,255,255,0.22); }
    #seq-clear {
      padding: 0.26rem 0.65rem;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; color: rgba(255,255,255,0.50);
      font-family: var(--font); font-size: 0.78rem; letter-spacing: 0.08em;
      cursor: pointer; transition: background 0.12s, color 0.12s;
    }
    #seq-clear:hover { background: rgba(220,60,60,0.25); color: #fff; }
    #seq-grid  { display: flex; flex-direction: column; gap: 0.24rem; }
    .seq-row   { display: flex; flex-direction: row; align-items: center; gap: 0.18rem; }
    .seq-track-label {
      width: 52px; flex-shrink: 0;
      font-family: var(--font); font-size: 0.60rem; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.40); text-align: right; padding-right: 5px;
    }
    .seq-step {
      flex: 1; height: clamp(26px, 4.2vh, 40px);
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px; cursor: pointer; padding: 0;
      transition: background 0.05s, box-shadow 0.05s;
    }
    .seq-step.g4 { margin-left: 4px; }
    .seq-step.on {
      background: var(--sc); border-color: transparent;
      box-shadow: 0 0 7px 1px var(--sc);
    }
    .seq-step.head { outline: 2.5px solid rgba(255,255,255,0.82); outline-offset: -2px; }
    .seq-step.on.head { filter: brightness(1.35); }

    /* ── Piano (lead) ── */
    #piano-area {
      display: flex; flex-direction: column;
      align-items: center; flex: 1; min-height: 0;
      justify-content: flex-end; gap: 0.25rem; padding-bottom: 0.15rem;
    }
    #piano-label {
      font-family: 'Barlow Condensed', var(--font);
      font-size: clamp(0.85rem, 1.8vh, 1.25rem);
      letter-spacing: 0.12em; color: rgba(255,255,255,0.58); text-align: center; flex-shrink: 0;
    }
    #mini-piano {
      position: relative; display: flex;
      width: 100%; height: clamp(110px, 18vh, 175px);
      user-select: none; touch-action: none;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.40));
    }
    .piano-white {
      flex: 1;
      background: linear-gradient(to bottom, #f0ece0, #e8e4d4);
      border: 1.5px solid #666; border-top: 2.5px solid #555;
      border-radius: 0 0 10px 10px; cursor: pointer;
      position: relative; z-index: 1; transition: background 0.06s;
      box-shadow: inset 0 -3px 6px rgba(0,0,0,0.18);
    }
    .piano-white.active { background: linear-gradient(to bottom, #b8d8f8, #90c0f0); }
    .piano-white:first-child { border-radius: 0 0 10px 10px; }
    .piano-black {
      position: absolute; top: 0; height: 62%;
      background: linear-gradient(to bottom, #1a1a22, #2c2c38);
      border-radius: 0 0 7px 7px; z-index: 2; cursor: pointer;
      transform: translateX(-50%); transition: background 0.06s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.55), inset 0 -2px 4px rgba(255,255,255,0.07);
    }
    .piano-black.active { background: linear-gradient(to bottom, #2a4a7a, #3a6aaa); }
    /* ── Slider PIN overlay ── */
    #spo {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(4,4,14,0.97);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    #spo[hidden] { display: none; }
    #spo-inner { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; }
    #spo-subtitle {
      font-family: 'Barlow Condensed', var(--font);
      font-size: clamp(1.1rem, 2.4vw, 1.7rem);
      letter-spacing: 0.24em; color: rgba(255,255,255,0.40);
    }
    #spo-display {
      font-family: 'Barlow Condensed', var(--font);
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      letter-spacing: 0.12em; color: #fff;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(170,60,255,0.45);
      border-radius: 16px; padding: 0.8rem 3rem;
      min-width: 320px; text-align: center;
    }
    #spo-display.error { color: #f87171; animation: spo-shake 0.45s ease; }
    #spo-display.ok    { color: #4ade80; }
    @keyframes spo-shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-16px); }
      40% { transform: translateX(16px); }
      60% { transform: translateX(-10px); }
      80% { transform: translateX(10px); }
    }
    #spo-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; width: min(520px, 90vw);
      padding: 1.6rem; border-radius: 24px;
      border: 2px solid rgba(160,60,255,0.55);
      box-shadow: 0 0 24px 8px rgba(150,50,255,0.35), 0 0 60px 20px rgba(120,30,210,0.18);
      animation: pin-glow 2.2s ease-in-out infinite;
    }
    @keyframes pin-glow {
      0%,100% { box-shadow: 0 0 24px 8px rgba(150,50,255,0.35), 0 0 60px 20px rgba(120,30,210,0.18); }
      50%     { box-shadow: 0 0 38px 14px rgba(180,70,255,0.55), 0 0 90px 35px rgba(140,50,230,0.28); }
    }
    .spo-key {
      height: clamp(82px, 13vh, 110px);
      border-radius: 18px;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-family: 'Barlow Condensed', var(--font); font-weight: 600;
      background: rgba(255,255,255,0.09);
      border: 1.5px solid rgba(160,60,255,0.35);
      color: #fff; cursor: pointer;
      transition: background 0.12s, transform 0.08s, box-shadow 0.1s;
    }
    .spo-key:hover  { background: rgba(160,60,255,0.18); box-shadow: 0 0 12px 3px rgba(160,60,255,0.35); }
    .spo-key:active { transform: scale(0.88); background: rgba(160,60,255,0.28); }
    .spo-cancel { color: rgba(248,113,113,0.90); border-color: rgba(248,113,113,0.35); font-size: clamp(1.4rem,3.2vw,2.2rem); }
    .spo-del    { font-size: clamp(1.4rem,3.2vw,2.2rem); }
    body.status-open #open-screen  { display: flex; }
    body.status-open #layout       { display: none; }
    body.status-open #faq-btn      { display: none; }
    body.status-open #game-btn     { display: inline-flex; }

    /* Gif als achtergrond in de slider track */
    .slider-gif {
      position: absolute; top: 0; bottom: 0;
      height: 100%; width: auto;
      opacity: 0.22; pointer-events: none; z-index: 0; object-fit: cover;
    }
    #slider-gif-closed { right: 0; left: auto; }
    #slider-gif-open   { left: 0; right: auto; transform: scaleX(-1); display: none; }
    body.status-open  #slider-gif-closed { display: none; }
    body.status-open  #slider-gif-open   { display: block; }


    #right-title {
      font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      letter-spacing: 0.14em; color: #fff;
      flex-shrink: 0;
    }

    #right-msgs {
      flex: 1; overflow-y: auto; min-height: 0;
      display: flex; flex-direction: column; gap: 0.7rem;
      padding-right: 0.3rem;
    }
    #right-msgs::-webkit-scrollbar { width: 4px; }
    #right-msgs::-webkit-scrollbar-track { background: transparent; }
    #right-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.20); border-radius: 2px; }

    /* Message cards */
    .msg-card {
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 0.85rem 1rem;
    }

    /* ── AMBER SPARK border on unread cards ── */
    .msg-card.unread {
      border: none !important;
      background: rgba(22,14,2,0.72) !important;
      position: relative;
      isolation: isolate;
      animation: none !important;
    }

    .msg-card.unread::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 14px; padding: 2.5px;
      background: conic-gradient(
        from var(--spark-angle),
        rgba(251,191,36,0.18) 0deg,
        rgba(251,191,36,0.55) 80deg,
        rgba(255,220,100,0.90) 105deg,
        rgba(255,255,220,1.00) 115deg,
        rgba(255,200,60,0.80) 125deg,
        rgba(251,191,36,0.22) 160deg,
        rgba(251,191,36,0.22) 290deg,
        rgba(251,191,36,0.75) 320deg,
        rgba(255,230,80,1.00) 343deg,
        rgba(255,255,255,1.00) 352deg,
        rgba(255,180,30,0.90) 358deg,
        rgba(251,191,36,0.18) 360deg
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box,
                    linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spark-rotate 2.2s linear infinite;
      z-index: 1;
    }

    .msg-card.unread::after {
      content: '';
      position: absolute; inset: -8px; border-radius: 22px;
      background: conic-gradient(
        from var(--spark-angle),
        transparent 0deg, transparent 70deg,
        rgba(251,191,36,0.08) 90deg,
        rgba(255,200,60,0.35) 108deg,
        rgba(255,255,160,0.55) 116deg,
        rgba(255,200,60,0.25) 128deg,
        transparent 155deg, transparent 280deg,
        rgba(251,191,36,0.12) 310deg,
        rgba(255,240,100,0.50) 343deg,
        rgba(255,255,220,0.80) 352deg,
        rgba(255,200,60,0.40) 358deg,
        transparent 360deg
      );
      filter: blur(9px); z-index: -1;
      animation: spark-rotate 2.2s linear infinite;
    }

    .msg-card.unread .msg-meta,
    .msg-card.unread .msg-body,
    .msg-card.unread .msg-gelezen-btn,
    .msg-card.unread .msg-delete-btn { position: relative; z-index: 2; }

    .msg-meta {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      font-size: 0.80rem; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.44); margin-bottom: 0.35rem;
    }
    .msg-meta strong { color: rgba(255,255,255,0.90); }

    .msg-delete-btn {
      margin-left: auto; flex-shrink: 0;
      width: 34px; height: 34px;
      background: rgba(248,113,113,0.16);
      border: 1.5px solid rgba(248,113,113,0.40);
      border-radius: 8px; color: #f87171; font-size: 1.15rem;
      cursor: pointer; display: grid; place-items: center;
      transition: background 0.12s, transform 0.1s;
    }
    .msg-delete-btn:active { background: rgba(248,113,113,0.35); transform: scale(0.88); }

    .msg-body {
      font-size: 0.88rem; letter-spacing: 0.03em;
      color: rgba(255,255,255,0.82); line-height: 1.5;

        <h2>VEELGESTELDE VRAGEN</h2>
        <button class="faq-close" onclick="closeFaq()" aria-label="Sluiten">×</button>
      </div>
      <div id="faq-list">
        <!-- rendered by JS -->
      </div>
      <div id="faq-answer" hidden>
        <div id="faq-answer-icon"></div>
        <div id="faq-answer-text"></div>
        <button class="faq-back-btn" onclick="showFaqList()">← TERUG NAAR VRAGEN</button>
      </div>
    </div>
  </div>

  <script>
    const NS = 'ict-desk-v1', KEY_S = NS+':status', KEY_M = NS+':messages', KEY_A = NS+':archived', KEY_P = NS+':pin';
    const DEFAULT_PIN = '1234';

    let currentStatus = load(KEY_S, 'closed');
    let messages = load(KEY_M, []);
    let archived = load(KEY_A, []);
    let activeTab = 'inbox';
    let pinBuffer = '', tapCount = 0, tapTimer = null, toastTimer = null;

    applyStatus(currentStatus, false);
    renderRightPanel();

    document.getElementById('school-label').addEventListener('pointerdown', () => {
      tapCount++;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { tapCount = 0; }, 700);
      if (tapCount >= 3) { tapCount = 0; openPin(); }
    });
    document.getElementById('pin-keypad').addEventListener('pointerdown', e => {
      const k = e.target.closest('[data-k]');
      if (k) handlePinKey(k.dataset.k);
    });

    // ── Slider — PIN beschermd ────────────────────────────────
    const slKnob = document.getElementById('sl-knob');
    slKnob.addEventListener('pointerdown', e => {
      e.preventDefault();
      openSliderPin(currentStatus === 'closed' ? 'open' : 'closed');
    });
    slKnob.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' && currentStatus === 'closed') openSliderPin('open');
      if (e.key === 'ArrowLeft'  && currentStatus === 'open')   openSliderPin('closed');
    });

    // ── Status ───────────────────────────────────────────────
    function applyStatus(s, animate = true) {
      currentStatus = s; save(KEY_S, s);
      const hu = document.body.classList.contains('has-unread');
      document.body.className = (hu ? 'has-unread ' : '') + 'status-' + s;
      if (animate) {
        const sw = document.getElementById('status-word');
        sw.style.cssText = 'transform:scale(0.88);opacity:0.3;transition:transform .35s,opacity .35s';
        setTimeout(() => { sw.style.cssText = ''; }, 350);
      }
      const isOpen = s === 'open';
      document.getElementById('status-word').textContent = isOpen ? 'OPEN' : 'GESLOTEN';
      document.getElementById('sl-knob').setAttribute('aria-valuenow', isOpen ? '1' : '0');
    }

    function checkUnread() {
      document.body.classList.toggle('has-unread', messages.some(m => !m.read));
    }

    // ── Right panel ──────────────────────────────────────────
    function renderRightPanel() {
      const c = document.getElementById('right-msgs');
      if (!messages.length) {
        c.innerHTML = '<div class="right-empty">Geen berichten</div>';
        checkUnread(); return;
      }
      c.innerHTML = messages.slice().reverse().map(m => `
        <div class="msg-card ${m.read ? '' : 'unread'}">
          <div class="msg-meta">
            <strong>${esc(m.naam)}</strong><span>${esc(m.lnr)}</span><span>${esc(m.ts)}</span>
            <button class="msg-delete-btn" onclick="deleteFromRight('${esc(m.id)}')" aria-label="Verwijderen">×</button>
          </div>
          <div class="msg-body">${esc(m.bericht)}</div>
          ${!m.read ? `<button class="msg-gelezen-btn" onclick="markOneRead('${esc(m.id)}')">✓ GELEZEN</button>` : ''}
        </div>`).join('');
      checkUnread();
    }

    function markOneRead(id) {
      const m = messages.find(m => m.id === id);
      if (!m) return;
      m.read = true; save(KEY_M, messages); renderRightPanel();
    }
    function deleteFromRight(id) {
      messages = messages.filter(m => m.id !== id);
      save(KEY_M, messages); renderRightPanel(); toast('🗑️ VERWIJDERD');
    }

    // Enter in textarea submits; Shift+Enter still inserts newline
    document.getElementById('f-bericht').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('msg-form').requestSubmit(); }
    });

    // ── Submit ───────────────────────────────────────────────
    function submitMsg(e) {
      e.preventDefault();
      const naam = document.getElementById('f-naam').value.trim();
      const lnr  = document.getElementById('f-lnr').value.trim();
      const bericht = document.getElementById('f-bericht').value.trim();
      if (!naam || !lnr || !bericht) return;
      messages.push({ id: Date.now()+'-'+Math.random().toString(36).slice(2), naam, lnr, bericht,
        ts: new Date().toLocaleString('nl-NL', { dateStyle:'short', timeStyle:'short' }), read: false });
      save(KEY_M, messages);
      document.getElementById('msg-form').reset();
      document.body.classList.add('flashing');
      setTimeout(() => document.body.classList.remove('flashing'), 2000);
      renderRightPanel(); toast('✅ BERICHT VERSTUURD!');
    }

    // ── Admin tabs ────────────────────────────────────────────
    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-inbox').classList.toggle('active',   tab === 'inbox');
      document.getElementById('tab-archief').classList.toggle('active', tab === 'archief');
      document.getElementById('clear-all').textContent = tab === 'inbox' ? 'Alles wissen' : 'Archief legen';
      renderAdminMessages();
    }
    function renderAdminMessages() {
      const list = document.getElementById('msgs-list');
      const badge = document.getElementById('unread-badge');
      const unread = messages.filter(m => !m.read).length;
      badge.textContent = unread > 0 ? unread+' NIEUW' : ''; badge.classList.toggle('visible', unread > 0);
      if (activeTab === 'inbox') {
        if (!messages.length) { list.innerHTML = '<div class="msg-empty">GEEN BERICHTEN</div>'; return; }
        list.innerHTML = messages.slice().reverse().map(m => `
          <div class="admin-msg-card ${m.read?'':'unread'}">
            <div class="admin-msg-meta"><strong>${esc(m.naam)}</strong><span>📋 ${esc(m.lnr)}</span><span>🕐 ${esc(m.ts)}</span></div>
            <div class="admin-msg-body">${esc(m.bericht)}</div>
            <div class="admin-msg-actions">
              <button class="msg-btn msg-btn-archive"  onclick="archiveMsg('${esc(m.id)}')">📦 ARCHIVEREN</button>
              <button class="msg-btn msg-btn-delete"   onclick="deleteMsg('${esc(m.id)}')">🗑️ VERWIJDEREN</button>
            </div>
          </div>`).join('');
        messages = messages.map(m => ({...m, read:true})); save(KEY_M, messages);
        renderRightPanel(); badge.classList.remove('visible');
      } else {
        list.innerHTML = !archived.length ? '<div class="msg-empty">ARCHIEF IS LEEG</div>'
          : archived.slice().reverse().map(m => `
            <div class="admin-msg-card archived">
              <div class="admin-msg-meta"><strong>${esc(m.naam)}</strong><span>📋 ${esc(m.lnr)}</span><span>🕐 ${esc(m.ts)}</span></div>
              <div class="admin-msg-body">${esc(m.bericht)}</div>
              <div class="admin-msg-actions">
                <button class="msg-btn msg-btn-unarchive" onclick="unarchiveMsg('${esc(m.id)}')">↩️ TERUGPLAATSEN</button>
                <button class="msg-btn msg-btn-delete"    onclick="deleteArchived('${esc(m.id)}')">🗑️ VERWIJDEREN</button>
              </div>
            </div>`).join('');
      }
    }
    function archiveMsg(id) {
      const i = messages.findIndex(m => m.id === id); if (i<0) return;
      archived.push({...messages[i], read:true}); messages.splice(i,1);
      save(KEY_M,messages); save(KEY_A,archived); renderAdminMessages(); renderRightPanel(); toast('📦 GEARCHIVEERD');
    }
    function deleteMsg(id) {
      messages = messages.filter(m => m.id !== id); save(KEY_M,messages);
      renderAdminMessages(); renderRightPanel(); toast('🗑️ VERWIJDERD');
    }
    function unarchiveMsg(id) {
      const i = archived.findIndex(m => m.id === id); if (i<0) return;
      messages.push({...archived[i], read:true}); archived.splice(i,1);
      save(KEY_M,messages); save(KEY_A,archived); renderAdminMessages(); renderRightPanel(); toast('↩️ TERUG IN INBOX');
    }
    function deleteArchived(id) {
      archived = archived.filter(m => m.id !== id); save(KEY_A,archived);
      renderAdminMessages(); toast('🗑️ VERWIJDERD UIT ARCHIEF');
    }
    function clearAll() {
      if (activeTab==='inbox') {
        if (!confirm('Alle berichten verwijderen?')) return;
        messages=[]; save(KEY_M,messages); renderRightPanel(); toast('🗑️ INBOX GEWIST');
      } else {
        if (!confirm('Archief verwijderen?')) return;
        archived=[]; save(KEY_A,archived); toast('🗑️ ARCHIEF GEWIST');
      }
      renderAdminMessages();
    }

    // ── PIN ──────────────────────────────────────────────────
    function openPin()  { pinBuffer=''; updateDots(); document.getElementById('pin-overlay').classList.add('visible'); }
    function closePin() { pinBuffer=''; updateDots(); document.getElementById('pin-overlay').classList.remove('visible'); }
    function handlePinKey(k) {
      if (k==='cancel') { closePin(); return; }
      if (k==='del') pinBuffer=pinBuffer.slice(0,-1);
      else if (pinBuffer.length<4) pinBuffer+=k;
      updateDots();
      if (pinBuffer.length===4) setTimeout(checkPin,180);
    }
    function checkPin() {
      if (pinBuffer===load(KEY_P,DEFAULT_PIN)) { closePin(); openAdmin(); }
      else {
        const dots = document.getElementById('pin-dots');
        document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
        dots.classList.add('shake');
        setTimeout(()=>{ dots.classList.remove('shake'); document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error')); pinBuffer=''; updateDots(); },600);
      }
    }
    function updateDots() { document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinBuffer.length)); }
    function openAdmin()  { activeTab='inbox'; switchTab('inbox'); document.getElementById('admin-panel').classList.add('visible'); }
    function closeAdmin() { document.getElementById('admin-panel').classList.remove('visible'); }

    let currentFaqCat = null;

    function openFaq() {
      currentFaqCat = null;
      showFaqCategories();
      document.getElementById('faq-overlay').classList.add('visible');
    }
    function closeFaq() {
      document.getElementById('faq-overlay').classList.remove('visible');
    }
    function showFaqCategories() {
      currentFaqCat = null;
      const list = document.getElementById('faq-list');
      list.hidden = false;
      document.getElementById('faq-answer').hidden = true;
      list.classList.add('cat-grid');
      list.innerHTML = '<div class="faq-section-label faq-section-full">Kies een categorie</div>' +
        FAQ_CATS.map((cat, i) => `
          <div class="faq-cat-card" onclick="showFaqQuestions(${i})"
               style="--cat-kleur:${cat.kleur};--cat-rand:${cat.rand}">
            <span class="faq-q-icon">${cat.icon}</span>
            <span class="faq-q-text">${cat.naam}</span>
            <span class="faq-q-arrow">›</span>
          </div>`).join('');
    }
    function showFaqQuestions(catIdx) {
      currentFaqCat = catIdx;
      const cat = FAQ_CATS[catIdx];
      const list = document.getElementById('faq-list');
      list.hidden = false;
      list.classList.remove('cat-grid');
      document.getElementById('faq-answer').hidden = true;
      list.innerHTML =

         <div class="faq-section-label">${cat.icon} ${cat.naam}</div>` +

          <div class="faq-q-card" onclick="showFaqAnswer(${catIdx},${i})">

            <span class="faq-q-text">${esc(v.vraag)}</span>
            <span class="faq-q-arrow">›</span>
          </div>`).join('');
    }
    function showFaqAnswer(catIdx, qIdx) {
      currentFaqCat = catIdx;
      const f = FAQ_CATS[catIdx].vragen[qIdx];
      document.getElementById('faq-list').hidden = true;
      document.getElementById('faq-answer-icon').textContent = f.icon;
      document.getElementById('faq-answer-text').innerHTML = f.antwoord.replace(/\n/g, '<br>');
      document.getElementById('faq-answer').hidden = false;

    function showFaqList() {
      currentFaqCat !== null ? showFaqQuestions(currentFaqCat) : showFaqCategories();

    function save(k,v)  { try { localStorage.setItem(k,JSON.stringify(v)); } catch(_){} }
    function load(k,fb) { try { const v=localStorage.getItem(k); return v!==null?JSON.parse(v):fb; } catch(_){ return fb; } }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function toast(msg) {
      clearTimeout(toastTimer);
      const el=document.getElementById('toast');
      el.textContent=msg; el.classList.add('show');
      toastTimer=setTimeout(()=>el.classList.remove('show'),3500);
    }

    let spoBuffer = '', spoTarget = null;

    function openSliderPin(nextState) {
      spoTarget = nextState;
      spoBuffer = '';
      const d = document.getElementById('spo-display');
      d.textContent = "Don't Touch Me!";
      d.className = '';
      document.getElementById('spo').hidden = false;
    }
    function closeSliderPin() { document.getElementById('spo').hidden = true; }

    document.getElementById('spo').addEventListener('pointerdown', e => {
      const btn = e.target.closest('.spo-key');
      if (!btn) return;
      const k = btn.dataset.k;
      const d = document.getElementById('spo-display');
      if (k === 'cancel') { closeSliderPin(); return; }
      if (k === 'del') {
        spoBuffer = spoBuffer.slice(0, -1);
        d.textContent = spoBuffer.length ? '●'.repeat(spoBuffer.length) : "Don't Touch Me!";
        return;
      }
      if (spoBuffer.length === 0) d.textContent = '';
      spoBuffer += k;
      d.textContent = '●'.repeat(spoBuffer.length);
      if (spoBuffer.length === 3) {
        if (spoBuffer === SLIDER_PIN) {
          d.textContent = '✓'; d.className = 'ok';
          setTimeout(() => {
            closeSliderPin();
            applyStatus(spoTarget);
            toast(spoTarget === 'open' ? '✅ BALIE STAAT NU OP OPEN' : '🔴 BALIE STAAT NU OP GESLOTEN');
          }, 400);
        } else {
          d.className = 'error';
          setTimeout(() => {
            spoBuffer = '';
            d.textContent = "Don't Touch Me!";
            d.className = '';
          }, 900);
        }
      }
    });

    // ── Mini Piano ───────────────────────────────────────────
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playPianoNote(freq) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const f = freq * 1.5;

      const master = ctx.createGain();
      master.connect(ctx.destination);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = f * 6; filter.Q.value = 0.8;
      filter.connect(master);

      const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
      o1.type = 'sine'; o1.frequency.value = f;
      o1.connect(g1); g1.connect(filter);
      g1.gain.setValueAtTime(0.0001, now);
      g1.gain.linearRampToValueAtTime(0.50, now + 0.010);
      g1.gain.exponentialRampToValueAtTime(0.0001, now + 2.4);

      const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
      o2.type = 'sine'; o2.frequency.value = f / 2;
      o2.connect(g2); g2.connect(filter);
      g2.gain.setValueAtTime(0.0001, now);
      g2.gain.linearRampToValueAtTime(0.20, now + 0.012);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + 1.8);

      o1.start(now); o1.stop(now + 2.4);
      o2.start(now); o2.stop(now + 1.8);
    }

    const PIANO_NOTES = [
      { freq:261.63,black:false },{ freq:277.18,black:true,  pos:1  },
      { freq:293.66,black:false },{ freq:311.13,black:true,  pos:2  },
      { freq:329.63,black:false },
      { freq:349.23,black:false },{ freq:369.99,black:true,  pos:4  },
      { freq:392.00,black:false },{ freq:415.30,black:true,  pos:5  },
      { freq:440.00,black:false },{ freq:466.16,black:true,  pos:6  },
      { freq:493.88,black:false },
      { freq:523.25,black:false },
    ];

    function buildPiano() {
      const container = document.getElementById('mini-piano');
      const whites = PIANO_NOTES.filter(n => !n.black);
      const nW = whites.length; // 15 witte toetsen

      // Witte toetsen
      whites.forEach(note => {
        const k = document.createElement('div');
        k.className = 'piano-white';
        container.appendChild(k);
        addPianoListeners(k, note.freq);
      });

      // Zwarte toetsen — pos = rechterkant witte toets index
      const blackKeyWidth = (0.60 / nW * 100).toFixed(3) + '%';
      PIANO_NOTES.filter(n => n.black).forEach(note => {
        const k = document.createElement('div');
        k.className = 'piano-black';
        k.style.left  = (note.pos / nW * 100).toFixed(3) + '%';
        k.style.width  = blackKeyWidth;
        container.appendChild(k);
        addPianoListeners(k, note.freq);
      });
    }

    function addPianoListeners(key, freq) {
      key.addEventListener('pointerdown', e => {
        e.preventDefault();
        key.classList.add('active');
        playPianoNote(freq);
      });
      key.addEventListener('pointerup',    () => key.classList.remove('active'));
      key.addEventListener('pointerleave', () => key.classList.remove('active'));
      key.addEventListener('pointercancel',() => key.classList.remove('active'));
    }

    buildPiano();

    // ── Drum sounds ──────────────────────────────────────────
    function makeNoiseBuf(ctx, dur) {
      const n = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, n, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
      return buf;
    }

    const BEAT = {
      kick: ctx => {
        const now = ctx.currentTime;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.type = 'sine';
        o.frequency.setValueAtTime(160, now); o.frequency.exponentialRampToValueAtTime(35, now+0.45);
        g.gain.setValueAtTime(1.2, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
        o.start(now); o.stop(now+0.5);
      },
      snare: ctx => {
        const now = ctx.currentTime;
        const ns = ctx.createBufferSource(); ns.buffer = makeNoiseBuf(ctx, 0.25);
        const nf = ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=2200; nf.Q.value=0.9;
        const ng = ctx.createGain(); ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
        ng.gain.setValueAtTime(0.9, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.22);
        const o = ctx.createOscillator(), og = ctx.createGain();
        o.type='triangle'; o.frequency.value=190; o.connect(og); og.connect(ctx.destination);
        og.gain.setValueAtTime(0.45, now); og.gain.exponentialRampToValueAtTime(0.001, now+0.12);
        ns.start(now); ns.stop(now+0.25); o.start(now); o.stop(now+0.12);
      },
      hihat: ctx => {
        const now = ctx.currentTime;
        const ns = ctx.createBufferSource(); ns.buffer = makeNoiseBuf(ctx, 0.10);
        const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=7500;
        const g = ctx.createGain(); ns.connect(f); f.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.55, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.09);
        ns.start(now); ns.stop(now+0.10);
      },
      clap: ctx => {
        const now = ctx.currentTime;
        [0, 0.012, 0.024].forEach(off => {
          const ns = ctx.createBufferSource(); ns.buffer = makeNoiseBuf(ctx, 0.1);
          const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1100; f.Q.value=0.9;
          const g = ctx.createGain(); ns.connect(f); f.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(0.7, now+off); g.gain.exponentialRampToValueAtTime(0.001, now+off+0.11);
          ns.start(now+off); ns.stop(now+off+0.11);
        });
      },
      tom: ctx => {
        const now = ctx.currentTime;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.type='sine';
        o.frequency.setValueAtTime(110, now); o.frequency.exponentialRampToValueAtTime(55, now+0.35);
        g.gain.setValueAtTime(0.9, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        o.start(now); o.stop(now+0.4);
      },
    };

    // ── Step Sequencer ───────────────────────────────────────
    const SEQ_TRACKS = [
      { id:'kick',  label:'KICK',   color:'rgba(239,68,68,0.82)'  },
      { id:'snare', label:'SNARE',  color:'rgba(234,179,8,0.82)'  },
      { id:'hihat', label:'HI-HAT', color:'rgba(34,197,94,0.82)'  },
      { id:'clap',  label:'CLAP',   color:'rgba(249,115,22,0.82)' },
      { id:'tom',   label:'TOM',    color:'rgba(139,92,246,0.82)' },
    ];
    const SEQ_STEPS = 16;
    let seqPat = SEQ_TRACKS.map(() => Array(SEQ_STEPS).fill(false));
    let seqRunning = false, seqCurStep = 0, seqBpm = 120, seqTimer = null;

    function seqBuild() {
      const grid = document.getElementById('seq-grid');
      grid.innerHTML = '';
      SEQ_TRACKS.forEach((trk, t) => {
        const row = document.createElement('div');
        row.className = 'seq-row';
        const lbl = document.createElement('div');
        lbl.className = 'seq-track-label'; lbl.textContent = trk.label;
        row.appendChild(lbl);
        for (let s = 0; s < SEQ_STEPS; s++) {
          const btn = document.createElement('button');
          btn.className = 'seq-step' + (s % 4 === 0 ? ' g4' : '');
          btn.style.setProperty('--sc', trk.color);
          btn.dataset.t = t; btn.dataset.s = s;
          if (seqPat[t][s]) btn.classList.add('on');
          row.appendChild(btn);
        }
        grid.appendChild(row);
      });
      seqUpdateHead(seqRunning ? seqCurStep : -1);
    }

    function seqUpdateHead(step) {
      document.querySelectorAll('.seq-step').forEach(btn => {
        btn.classList.toggle('head', +btn.dataset.s === step);
      });
    }

    function seqTick() {
      const ctx = getAudioCtx();
      SEQ_TRACKS.forEach((trk, t) => {
        if (seqPat[t][seqCurStep]) BEAT[trk.id](ctx);
      });
      seqUpdateHead(seqCurStep);
      seqCurStep = (seqCurStep + 1) % SEQ_STEPS;
      seqTimer = setTimeout(seqTick, (60 / seqBpm / 4) * 1000);
    }

    function seqStart() {
      seqRunning = true; seqCurStep = 0;
      const btn = document.getElementById('seq-play');
      btn.textContent = '■ STOP'; btn.classList.add('playing');
      seqTick();
    }

    function seqStop() {
      seqRunning = false;
      clearTimeout(seqTimer); seqTimer = null;
      seqUpdateHead(-1);
      const btn = document.getElementById('seq-play');
      if (btn) { btn.textContent = '▶ PLAY'; btn.classList.remove('playing'); }
    }

    document.getElementById('seq-play').addEventListener('click', () => {
      seqRunning ? seqStop() : seqStart();
    });
    document.getElementById('seq-bpm-up').addEventListener('click', () => {
      seqBpm = Math.min(200, seqBpm + 5);
      document.getElementById('seq-bpm-val').textContent = seqBpm;
    });
    document.getElementById('seq-bpm-dn').addEventListener('click', () => {
      seqBpm = Math.max(60, seqBpm - 5);
      document.getElementById('seq-bpm-val').textContent = seqBpm;
    });
    document.getElementById('seq-clear').addEventListener('click', () => {
      seqPat = SEQ_TRACKS.map(() => Array(SEQ_STEPS).fill(false));
      seqBuild();
    });
    document.getElementById('seq-grid').addEventListener('pointerdown', e => {
      const btn = e.target.closest('.seq-step');
      if (!btn) return;
      const t = +btn.dataset.t, s = +btn.dataset.s;
      seqPat[t][s] = !seqPat[t][s];
      btn.classList.toggle('on', seqPat[t][s]);
      if (seqPat[t][s]) BEAT[SEQ_TRACKS[t].id](getAudioCtx());
    });

    // Stop sequencer when leaving OPEN state
    new MutationObserver(() => {
      if (!document.body.classList.contains('status-open') && seqRunning) seqStop();
    }).observe(document.body, { attributes: true, attributeFilter: ['class'] });

    seqBuild();

    // ── Screen wake lock + webcam bewegingsdetectie ───────────
    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => {
            wakeLock = null;
            setTimeout(requestWakeLock, 3000);
          });
        }
      } catch (_) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    async function startMotionDetection() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 160, height: 90, facingMode: 'user' }
        });
        const video = document.createElement('video');
        video.srcObject = stream; video.muted = true; video.playsInline = true;
        await video.play();

        const canvas = document.createElement('canvas');
        canvas.width = 80; canvas.height = 45;
        const ctx2 = canvas.getContext('2d', { willReadFrequently: true });
        let prev = null, cooldown = 0;

        setInterval(() => {
          ctx2.drawImage(video, 0, 0, 80, 45);
          const frame = ctx2.getImageData(0, 0, 80, 45).data;
          if (prev) {
            let diff = 0;
            for (let i = 0; i < frame.length; i += 4) diff += Math.abs(frame[i] - prev[i]);
            if (diff / (80 * 45) > 8 && Date.now() > cooldown) {
              cooldown = Date.now() + 4000;
              if (!wakeLock) requestWakeLock();
            }
          }
          prev = new Uint8ClampedArray(frame);
        }, 400);

      } catch (_) {
        // Geen cameratoestemming — val terug op pointer events
        document.addEventListener('pointermove', () => { if (!wakeLock) requestWakeLock(); }, { passive: true });
      }
    }
    startMotionDetection();

  </script>

  <!-- ── Offline mini-game ── -->
  <style>
    #dino-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: none; overflow: hidden;
      background: #0d1422;
    }
    #dino-overlay.active { display: block; }

  </style>

  <div id="dino-overlay" aria-label="Offline mini-game">
    <canvas id="dino-canvas"></canvas>
  </div>

  <script>
  /* Offline runner v3 — perf geoptimaliseerd (Chromebook),
     pre-rendered flora + achtergrond, 2 parallax-lagen, lagere gebouwen
     Trigger: window offline | Alt+G testen | Escape sluiten */
  (function () {
    const OL = document.getElementById('dino-overlay');
    const CV = document.getElementById('dino-canvas');
    const CX = CV.getContext('2d');

    let W = 0, H = 0, GND = 0;
    let bgCache = null;    // pre-rendered sky + sterren

    function renderBg() {
      bgCache = document.createElement('canvas');
      bgCache.width = W; bgCache.height = H;
      const bx = bgCache.getContext('2d');
      const sky = bx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,'#0d1830'); sky.addColorStop(0.65,'#1e3060'); sky.addColorStop(1,'#0a1020');
      bx.fillStyle = sky; bx.fillRect(0,0,W,H);
      bx.fillStyle = 'rgba(255,255,255,0.5)';
      for (let i=0;i<45;i++) bx.fillRect((i*137+71)%W, (i*83+17)%(H*0.50), 1.5, 1.5);
    }
    function resize() {
      W = CV.width  = OL.clientWidth;
      H = CV.height = OL.clientHeight;
      GND = H * 0.75;
      renderBg();
    }

    // ── State ────────────────────────────────────────────────
    const S = { IDLE: 0, RUN: 1, DEAD: 2 };
    let gs = S.IDLE;
    let score = 0, best = +localStorage.getItem('dino-best') || 0;
    let spd = 5, tick = 0, raf = null;

    // ── Player (2× groter) ───────────────────────────────────
    const P = { x: 100, y: 0, vy: 0, duck: false, grounded: true,
                W: 84, H: 124, dW: 104, dH: 64 };
    const pw = () => P.duck ? P.dW : P.W;
    const ph = () => P.duck ? P.dH : P.H;

    function pReset() { P.y = GND - ph(); P.vy = 0; P.duck = false; P.grounded = true; }
    function pJump()  { if (!P.grounded) return; P.vy = -22; P.grounded = false; }
    function pUpdate() {
      if (!P.grounded) {
        P.vy += 0.85; P.y += P.vy;
        if (P.y >= GND - ph()) { P.y = GND - ph(); P.vy = 0; P.grounded = true; }
      } else {
        P.y = GND - ph();
      }
    }

    // ── Obstacles ────────────────────────────────────────────
    // Billboard: y=GND-132, h=58  → duck player (GND-64) top+10=GND-54 < bottom-10=GND-84? NO → safe
    // Crow:      y=GND-135, h=50  → duck player top+10=GND-54 < bottom-10=GND-95?       NO → safe
    let obs = [], nextObs = 100;
    function spawnObs() {
      const canFox  = score > 600;
      const canCrow = score > 1200;
      const pool = ['bld','bld','bld','bld','bill','bill'];
      if (canFox)  pool.push('fox','fox');
      if (canCrow) pool.push('crow','crow');
      const type = pool[Math.floor(Math.random() * pool.length)];
      switch (type) {
        case 'bld': {
          const h = 70 + Math.random() * 40;
          obs.push({ x: W+20, y: GND-h, w: 55+Math.random()*35, h, type }); break;
        }
        case 'bill':
          obs.push({ x: W+20, y: GND-132, w: 90, h: 58, type }); break;
        case 'fox': {
          const h = 58 + Math.random() * 14;
          obs.push({ x: W+20, y: GND-h, w: 72, h, type }); break;
        }
        case 'crow':
          obs.push({ x: W+20, y: GND-135, w: 72, h: 50, type }); break;
      }
      nextObs = Math.max(45, 100 + Math.random()*120 - score/100);
    }

    // ── Parallax flora ───────────────────────────────────────
    let flora = { mid:[], near:[] };
    let poff  = { mid:0, near:0 };
    function initFlora() {
      flora.mid = [];
      for (let x=0; x<2400; x += 130+Math.random()*100)
        flora.mid.push({ x, h: 55+Math.random()*40, t: Math.random()<0.55?'pine':'oak' });
      flora.near = [];
      for (let x=0; x<1600; x += 90+Math.random()*60)
        flora.near.push({ x, h: 18+Math.random()*14, t:'bush' });
      poff = { mid:0, near:0 };
    }

    // ── Helpers ───────────────────────────────────────────────
    function rr(x, y, w, h, r) {
      if (CX.roundRect) { CX.beginPath(); CX.roundRect(x, y, w, h, r); return; }
      CX.beginPath();
      CX.moveTo(x+r,y); CX.arcTo(x+w,y,x+w,y+r,r); CX.arcTo(x+w,y+h,x+w-r,y+h,r);
      CX.arcTo(x,y+h,x,y+h-r,r); CX.arcTo(x,y,x+r,y,r); CX.closePath();
    }

    // ── Flora (pixel-art) ─────────────────────────────────────
    function drawPine(x, baseY, h) {
      const tw = Math.max(4, h*0.10), th = h*0.22, cw = h*0.55;
      CX.fillStyle = '#5C3A1E'; CX.fillRect(x-tw/2, baseY-th, tw, th);
      for (let i=0; i<5; i++) {
        const lw = cw*(5-i)/5, ly = baseY-th-h*0.78*(i+1)/5;
        CX.fillStyle = i%2===0 ? '#1E5C14' : '#267A1C';
        CX.fillRect(x-lw/2, ly, lw, h*0.78/5*1.3);
      }
    }
    function drawOak(x, baseY, h) {
      const tw = Math.max(4, h*0.10), th = h*0.38, cr = h*0.38;
      CX.fillStyle = '#6B4226'; CX.fillRect(x-tw/2, baseY-th, tw, th);
      CX.fillStyle = '#267020';
      CX.fillRect(x-cr, baseY-th-cr*1.1, cr*2, cr*1.1);
      CX.fillRect(x-cr*0.7, baseY-th-cr*1.55, cr*1.4, cr*0.5);
      CX.fillStyle = '#338A28';
      CX.fillRect(x-cr*0.6, baseY-th-cr*1.2, cr*0.5, cr*0.4);
    }
    function drawBush(x, baseY, h) {
      CX.fillStyle = '#1A6010';
      CX.fillRect(x-h, baseY-h*0.65, h*2, h*0.65);
      CX.fillRect(x-h*0.6, baseY-h, h*1.2, h*0.4);
      CX.fillStyle = '#228018';
      CX.fillRect(x-h*0.7, baseY-h*0.8, h*0.4, h*0.3);
    }

    // ── Obstakels ─────────────────────────────────────────────
    function drawBuilding(x, y, w, h) {
      CX.fillStyle = '#7A8A9A'; CX.fillRect(x, y, w, h);
      CX.fillStyle = '#4A5A6A'; CX.fillRect(x, y, w, 6);
      CX.fillStyle = 'rgba(0,0,0,0.18)'; CX.fillRect(x+w-5, y+6, 5, h-6);
      const cols = Math.max(1, Math.floor(w/18)), rows = Math.max(1, Math.floor((h-12)/22));
      for (let c=0; c<cols; c++) for (let r=0; r<rows; r++) {
        CX.fillStyle = (c*3+r*5)%7!==0 ? '#FFE87C' : '#2A3040';
        CX.fillRect(x+5+c*18, y+10+r*22, 10, 12);
      }
    }
    function drawBillboard(x, y, w, h) {
      CX.fillStyle = '#888';
      CX.fillRect(x+w*0.2-3, y+h, 6, GND-y-h+2);
      CX.fillRect(x+w*0.8-3, y+h, 6, GND-y-h+2);
      CX.fillStyle = '#F0E8D0'; CX.fillRect(x, y, w, h);
      CX.fillStyle = '#C8B880'; CX.fillRect(x, y, w, 5); CX.fillRect(x, y+h-5, w, 5);
      CX.fillStyle = '#1a3a6b';
      CX.font = `bold ${Math.max(10,h*0.44)}px 'Bebas Neue','Barlow Condensed',sans-serif`;
      CX.textAlign = 'center'; CX.textBaseline = 'middle';
      CX.fillText('DALTON', x+w/2, y+h*0.38);
      CX.font = `${Math.max(7,h*0.24)}px 'Barlow Condensed',sans-serif`;
      CX.fillText('DEN HAAG', x+w/2, y+h*0.72);
    }

    // ── Vijanden ──────────────────────────────────────────────
    function drawFox(x, y, h) {
      const bY = y+h, sw = Math.sin(tick*0.38)*6;
      CX.save();
      CX.fillStyle = '#E8630A';
      CX.beginPath(); CX.ellipse(x+h*0.12, bY-h*0.42, h*0.26, h*0.16, -0.4, 0, Math.PI*2); CX.fill();
      CX.fillStyle = '#fff';
      CX.beginPath(); CX.ellipse(x+h*0.09, bY-h*0.42, h*0.11, h*0.07, -0.4, 0, Math.PI*2); CX.fill();
      CX.fillStyle = '#E8630A'; rr(x+h*0.26, bY-h*0.62, h*0.64, h*0.40, h*0.08); CX.fill();
      CX.fillStyle = '#fff';    rr(x+h*0.38, bY-h*0.55, h*0.35, h*0.30, h*0.06); CX.fill();
      CX.fillStyle = '#E8630A'; rr(x+h*0.64, bY-h*0.82, h*0.36, h*0.38, h*0.09); CX.fill();
      CX.fillStyle = '#fff';    rr(x+h*0.84, bY-h*0.67, h*0.22, h*0.20, h*0.05); CX.fill();
      CX.fillStyle = '#333'; CX.beginPath(); CX.arc(x+h*1.02, bY-h*0.60, h*0.04, 0, Math.PI*2); CX.fill();
      CX.fillStyle = '#222'; CX.beginPath(); CX.arc(x+h*0.76,  bY-h*0.76, h*0.045, 0, Math.PI*2); CX.fill();
      CX.fillStyle = '#E8630A';
      CX.beginPath(); CX.moveTo(x+h*0.66,bY-h*0.80); CX.lineTo(x+h*0.60,bY-h*1.02); CX.lineTo(x+h*0.76,bY-h*0.88); CX.fill();
      CX.beginPath(); CX.moveTo(x+h*0.82,bY-h*0.80); CX.lineTo(x+h*0.82,bY-h*1.02); CX.lineTo(x+h*0.96,bY-h*0.86); CX.fill();
      CX.fillStyle = '#C44A00';
      rr(x+h*0.30,bY-h*0.25,h*0.12,h*0.25+sw,h*0.03); CX.fill();
      rr(x+h*0.46,bY-h*0.25,h*0.12,h*0.25-sw,h*0.03); CX.fill();
      rr(x+h*0.62,bY-h*0.25,h*0.12,h*0.25+sw,h*0.03); CX.fill();
      rr(x+h*0.78,bY-h*0.25,h*0.12,h*0.25-sw,h*0.03); CX.fill();
      CX.restore();
    }
    function drawCrow(x, y, w, h) {
      const cx2 = x+w*0.5, cy2 = y+h*0.5, wf = Math.sin(tick*0.22)*0.7;
      CX.save();
      CX.fillStyle = '#18182A';
      CX.beginPath(); CX.ellipse(cx2+w*0.05, cy2+h*0.10, w*0.30, h*0.28, 0, 0, Math.PI*2); CX.fill();
      CX.fillStyle = '#101020';
      CX.beginPath(); CX.moveTo(cx2+w*0.32,cy2+h*0.08); CX.lineTo(x+w+8,cy2); CX.lineTo(x+w+8,cy2+h*0.22); CX.lineTo(cx2+w*0.32,cy2+h*0.22); CX.fill();
      CX.save(); CX.translate(cx2-w*0.08, cy2-h*0.05); CX.rotate(wf-0.2);
      CX.fillStyle='#202038'; CX.beginPath(); CX.ellipse(-w*0.28,-h*0.15,w*0.32,h*0.14,0.3,0,Math.PI*2); CX.fill(); CX.restore();
      CX.save(); CX.translate(cx2+w*0.18, cy2-h*0.05); CX.rotate(-(wf-0.2));
      CX.fillStyle='#202038'; CX.beginPath(); CX.ellipse(w*0.22,-h*0.15,w*0.28,h*0.12,-0.3,0,Math.PI*2); CX.fill(); CX.restore();
      CX.fillStyle='#18182A'; CX.beginPath(); CX.arc(cx2-w*0.28,cy2-h*0.08,h*0.24,0,Math.PI*2); CX.fill();
      CX.fillStyle='#777766'; CX.beginPath(); CX.moveTo(cx2-w*0.48,cy2-h*0.08); CX.lineTo(cx2-w*0.62,cy2-h*0.02); CX.lineTo(cx2-w*0.48,cy2+h*0.10); CX.fill();
      CX.fillStyle='#fff'; CX.beginPath(); CX.arc(cx2-w*0.32,cy2-h*0.14,h*0.07,0,Math.PI*2); CX.fill();
      CX.fillStyle='#111'; CX.beginPath(); CX.arc(cx2-w*0.33,cy2-h*0.14,h*0.04,0,Math.PI*2); CX.fill();
      CX.restore();
    }

    // ── Leerling karakter (2×) ────────────────────────────────
    function drawStudent(x, y) {
      const dk = P.duck;
      const SKIN='#f4a261',HAIR='#2a1a0a',SHIRT='#457b9d',PANTS='#1d3557',SHOE='#e8e0d0',BP1='#e63946',BP2='#c1121f';
      CX.save();
      if (!dk) {
        const sw = Math.sin(tick*0.28)*18;
        CX.fillStyle=BP1;  rr(x+2,  y+26, 40, 72, 8); CX.fill();
        CX.fillStyle=BP2;  rr(x+8,  y+44, 24, 26, 4); CX.fill();
        CX.strokeStyle=BP2; CX.lineWidth=5;
        CX.beginPath(); CX.moveTo(x+28,y+30); CX.lineTo(x+42,y+42); CX.stroke();
        CX.fillStyle=SHIRT; rr(x+38, y+36, 36, 48, 6); CX.fill();
        CX.fillStyle=SKIN;  CX.beginPath(); CX.arc(x+56,y+22,22,0,Math.PI*2); CX.fill();
        CX.fillStyle=HAIR;  CX.beginPath(); CX.ellipse(x+56,y+6,22,14,0,Math.PI,Math.PI*2); CX.fill();
        CX.fillStyle='#333'; CX.fillRect(x+46,y+18,6,6); CX.fillRect(x+60,y+18,6,6);
        CX.strokeStyle='#333'; CX.lineWidth=2;
        CX.beginPath(); CX.arc(x+56,y+26,7,0.2,Math.PI-0.2); CX.stroke();
        CX.fillStyle=PANTS;
        rr(x+40,y+80,14,32+sw,4); CX.fill();
        rr(x+58,y+80,14,32-sw,4); CX.fill();
        CX.fillStyle=SHOE;
        CX.fillRect(x+36,y+110+sw,22,10); CX.fillRect(x+54,y+110-sw,22,10);
      } else {
        CX.fillStyle=BP1;  rr(x+2,  y+6,  48, 48, 8); CX.fill();
        CX.fillStyle=BP2;  rr(x+10, y+20, 30, 20, 4); CX.fill();
        CX.fillStyle=SHIRT; rr(x+44, y+14, 44, 30, 6); CX.fill();
        CX.fillStyle=SKIN;  CX.beginPath(); CX.arc(x+78,y+14,18,0,Math.PI*2); CX.fill();
        CX.fillStyle=HAIR;  CX.beginPath(); CX.ellipse(x+78,y+2,18,10,-0.2,Math.PI,Math.PI*2); CX.fill();
        CX.fillStyle='#333'; CX.fillRect(x+68,y+10,5,5); CX.fillRect(x+80,y+10,5,5);
        CX.fillStyle=PANTS;
        rr(x+46,y+40,16,20,4); CX.fill(); rr(x+66,y+40,16,20,4); CX.fill();
        CX.fillStyle=SHOE; CX.fillRect(x+42,y+58,24,8); CX.fillRect(x+62,y+58,24,8);
      }
      CX.restore();
    }

    // ── Collision ─────────────────────────────────────────────
    function hits(o) {
      const m = 10;
      return (P.x+m) < (o.x+o.w-m) && (P.x+pw()-m) > (o.x+m) &&
             (P.y+m) < (o.y+o.h-m) && (P.y+ph()-m) > (o.y+m);
    }

    // ── Loop ──────────────────────────────────────────────────
    function update() {
      const ps = gs === S.RUN ? spd : 1.5;
      poff.mid  += ps * 0.42;
      poff.near += ps * 0.80;
      if (gs !== S.RUN) return;
      tick++; score++; spd = 5 + score * 0.0013;
      pUpdate();
      nextObs--; if (nextObs <= 0) spawnObs();
      obs.forEach(o => { o.x -= o.type === 'fox' ? spd * 1.3 + 1 : spd; });
      obs = obs.filter(o => o.x + o.w > -10);
      if (obs.some(hits)) {
        gs = S.DEAD;
        if (score > best) { best = score; localStorage.setItem('dino-best', best); }
      }
    }

    function draw() {
      CX.clearRect(0, 0, W, H);
      if (bgCache) CX.drawImage(bgCache, 0, 0);

      // Mid trees — one globalAlpha for the whole layer
      CX.save(); CX.globalAlpha = 0.28;
      const mR=2400; flora.mid.forEach(it => {
        const dx = ((it.x-poff.mid)%mR+mR)%mR-150;
        if (dx>-120&&dx<W+120) it.t==='pine' ? drawPine(dx,GND,it.h) : drawOak(dx,GND,it.h);
      });
      CX.restore();

      // Ground
      CX.fillStyle='rgba(14,30,60,0.55)'; CX.fillRect(0,GND,W,H-GND);

      // Near bushes — one globalAlpha for the whole layer
      CX.save(); CX.globalAlpha = 0.50;
      const nR=1600; flora.near.forEach(it => {
        const dx = ((it.x-poff.near)%nR+nR)%nR-80;
        if (dx>-80&&dx<W+80) drawBush(dx, GND, it.h);
      });
      CX.restore();

      CX.strokeStyle='rgba(80,120,180,0.32)'; CX.lineWidth=2;
      CX.beginPath(); CX.moveTo(0,GND); CX.lineTo(W,GND); CX.stroke();

      obs.forEach(o => {
        if (o.type==='bld')        drawBuilding(o.x, o.y, o.w, o.h);
        else if (o.type==='bill')  drawBillboard(o.x, o.y, o.w, o.h);
        else if (o.type==='fox')   drawFox(o.x, o.y, o.h);
        else if (o.type==='crow')  drawCrow(o.x, o.y, o.w, o.h);
      });
      drawStudent(P.x, P.y);

      CX.save();
      CX.fillStyle='rgba(255,255,255,0.80)';
      CX.font=`bold ${Math.max(14,W*0.022)}px 'Barlow Condensed',sans-serif`;
      CX.textAlign='right'; CX.textBaseline='top';
      CX.fillText('HI '+String(best).padStart(5,'0')+'  '+String(score).padStart(5,'0'), W-24, 22);
      CX.restore();

      const af = `bold ${Math.max(16,W*0.028)}px 'Bebas Neue','Barlow Condensed',sans-serif`;
      if (score>=580&&score<=660) {
        CX.save(); CX.globalAlpha=Math.max(0,1-Math.abs(score-620)/40);
        CX.fillStyle='#FFB020'; CX.font=af; CX.textAlign='center'; CX.textBaseline='top';
        CX.fillText('🦊 DE VOS IS IN HET VELD!', W/2, H*0.06); CX.restore();
      }
      if (score>=1180&&score<=1260) {
        CX.save(); CX.globalAlpha=Math.max(0,1-Math.abs(score-1220)/40);
        CX.fillStyle='#C090FF'; CX.font=af; CX.textAlign='center'; CX.textBaseline='top';
        CX.fillText('🐦 DE KRAAI VLIEGT MEE!', W/2, H*0.06); CX.restore();
      }
      if (gs !== S.RUN) {
        CX.save(); CX.textAlign='center'; CX.textBaseline='middle';
        CX.fillStyle='rgba(255,255,255,0.92)';
        CX.font=`bold ${Math.max(26,W*0.042)}px 'Bebas Neue','Barlow Condensed',sans-serif`;
        CX.fillText(gs===S.DEAD?'GAME OVER':'GEEN INTERNET', W/2, H*0.43);
        CX.fillStyle='rgba(255,255,255,0.55)';
        CX.font=`${Math.max(14,W*0.021)}px 'Barlow Condensed',sans-serif`;
        CX.fillText('Tik of druk SPATIE om te spelen', W/2, H*0.52); CX.restore();
      }
    }

    function loop() { update(); draw(); raf = requestAnimationFrame(loop); }

    function startGame() {
      score=0; spd=5; tick=0; obs=[]; nextObs=100; pReset(); gs=S.RUN;
    }
    function show() {
      OL.classList.add('active'); resize(); initFlora(); pReset(); gs=S.IDLE;
      if (!raf) raf = requestAnimationFrame(loop);
    }
    function hide() {
      OL.classList.remove('active');
      if (raf) { cancelAnimationFrame(raf); raf=null; } gs=S.IDLE;
    }

    document.addEventListener('keydown', e => {
      if (!OL.classList.contains('active')) return;
      if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); if (gs!==S.RUN) startGame(); else pJump(); }
      if (e.code==='ArrowDown') { e.preventDefault(); P.duck=true; }
      if (e.code==='Escape') hide();
    });
    document.addEventListener('keyup', e => { if (e.code==='ArrowDown') P.duck=false; });
    OL.addEventListener('pointerdown', e => {
      if (gs!==S.RUN) { startGame(); return; }
      e.clientY > OL.clientHeight*0.58 ? (P.duck=true) : pJump();
    });
    OL.addEventListener('pointerup', () => { P.duck=false; });
    window.addEventListener('resize', () => { if (OL.classList.contains('active')) { resize(); if (gs!==S.RUN) pReset(); } });

    window.toggleDinoGame = () => OL.classList.contains('active') ? hide() : show();
    window.addEventListener('offline', show);
    window.addEventListener('online',  hide);
    document.addEventListener('keydown', e => { if (e.altKey&&e.code==='KeyG') OL.classList.contains('active')?hide():show(); });
    if (!navigator.onLine) show();
  })();
  </script>
</body>
</html>
