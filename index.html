<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ICT Desk · Dalton Den Haag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --open-a:  #00ff41;
      --open-b:  #00aa2a;
      --clos-a:  #ff0033;
      --clos-b:  #aa0022;
      --glass:   rgba(0,0,0,0.22);
      --border:  rgba(0,255,65,0.18);
      --font:    'Barlow Condensed', 'Arial Narrow', sans-serif;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    html {
      height: 100%;
    }
    body {
      height: 100%; overflow: hidden;
      font-family: var(--font);
      display: flex;
      flex-direction: column;
    }
    input, textarea, button { font-family: var(--font); }

    /* ── Background ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: filter 0.6s ease;
    }
    body.status-closed #bg {
      background-image: url('bg-closed.jpg');
    }
    body.status-open #bg {
      background-image: url('bg-open.png');
    }

    @keyframes bg-pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
    body.has-unread #bg { animation: bg-pulse 5s ease-in-out infinite; }

    /* ── School label — triple-tap → admin (invisible tap zone) ── */
    #school-label {
      position: relative; z-index: 2;
      height: 32px; flex-shrink: 0;
      cursor: default;
    }

    /* ── Status word — full-width, top ── */
    #status-word-wrap {
      position: relative; z-index: 2;
      flex-shrink: 0;
      display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden; /* prevent horizontal bleed */
      padding: 0;
      line-height: 1;
    }

    #status-word {
      font-family: 'Bebas Neue', var(--font);
      font-size: min(15vw, 16vh);
      letter-spacing: 0.28em;
      margin-right: -0.28em;
      color: #fff;
      line-height: 0.88;
      text-shadow: 0 6px 48px rgba(0,0,0,0.30);
      transition: letter-spacing 0.6s ease, margin-right 0.6s ease;
      white-space: nowrap;
    }
    body.status-open #status-word {
      letter-spacing: 1.05em;
      margin-right: -1.05em;
      color: #fff;
      text-shadow: 0 4px 24px rgba(0,255,65,0.35);
    }

    /* ── 2-column grid ── */
    #layout {
      position: relative; z-index: 1;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    /* ── LEFT panel — form, bottom-aligned ── */
    #left-panel {
      align-self: end;
      display: flex; flex-direction: column;
      padding: 0.8rem 1.2rem 1.2rem;
      background: rgba(0,0,0,0.48);
      border: 1px solid var(--border);
      border-radius: 16px;
      height: 100%;
      overflow: hidden;
    }

    /* form section fills space when GESLOTEN */
    #form-section {
      display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-height: 0;
    }

    #left-title {
      font-size: clamp(2.2rem, 4.4vw, 3.2rem);
      letter-spacing: 0.14em; color: #fff; flex-shrink: 0;
    }

    /* OPEN welcome — centered in same panel height */
    #open-welcome {
      display: none; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.8rem; text-align: center;
    }
    body.status-open #open-welcome { display: flex; }
    #open-welcome-text {
      font-size: clamp(1.7rem, 3.4vw, 2.6rem);
      letter-spacing: 0.16em; color: #fff; line-height: 1.2;
    }
    #open-welcome-emoji { font-size: 5rem; line-height: 1; }

    #msg-form { display: flex; flex-direction: column; gap: 0.4rem; }

    #msg-form input,
    #msg-form textarea {
      background: rgba(255,255,255,0.14);
      border: 1.5px solid rgba(255,255,255,0.26);
      border-radius: 12px; padding: 0.5rem 0.85rem;
      color: #fff; font-size: 1.8rem; letter-spacing: 0.05em;
      min-height: 38px;
      transition: border-color 0.2s, background 0.2s;
      user-select: text;
    }
    #msg-form input::placeholder,
    #msg-form textarea::placeholder { color: rgba(255,255,255,0.40); }
    #msg-form input:focus,
    #msg-form textarea:focus {
      border-color: rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.20); outline: none;
    }
    #f-bericht { height: clamp(40px, 5vh, 70px); resize: none; }

    #f-submit {
      padding: 0.6rem; min-height: 40px;
      background-image: linear-gradient(to right, #ff0033 0%, #00ff41 51%, #ff0033 100%);
      background-size: 200% auto; background-position: left center;
      color: #fff;
      font-size: 2rem; letter-spacing: 0.14em;
      border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 0 16px rgba(0,0,0,0.25);
      transition: background-position 0.5s, transform 0.12s;
    }
    #f-submit:hover  { background-position: right center; }
    #f-submit:active { transform: scale(0.94); }

    @keyframes flash {
      0%,100%{filter:brightness(1)} 25%{filter:brightness(1.5)}
      50%{filter:brightness(0.78)} 75%{filter:brightness(1.35)}
    }
    body.flashing #bg { animation: flash 0.5s ease 3; }

    /* ── SPARK animation ── */
    @property --spark-angle {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }
    @keyframes spark-rotate { to { --spark-angle: 360deg; } }

    /* ── RIGHT panel — messages, same fixed height as left panel ── */
    #right-panel {
      align-self: end;
      display: flex; flex-direction: column;
      padding: 0.8rem 1.2rem 1.2rem;
      background: rgba(0,0,0,0.48);
      border: 1px solid var(--border);
      border-radius: 16px;
      gap: 0.6rem;
      overflow: hidden;
      height: 100%;
    }
    body.status-open #right-panel { display: none; }

    /* ── OPEN full-screen welcome ── */
    #open-screen {
      display: none;
      flex: 1; min-height: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 0.6rem;
      position: relative; z-index: 1;
      padding: 0.4rem 1.2rem 0.5rem;
    }

    /* ── Step Sequencer ── */
    #seq-area {
      display: flex; flex-direction: column; gap: 0.32rem; flex: 1; min-height: 0;
      background: rgba(0,0,0,0.32); border-radius: 10px; padding: 0.55rem 0.65rem;
    }
    #seq-transport { display: flex; flex-direction: row; align-items: center; gap: 0.65rem; }
    #seq-play {
      padding: 0.36rem 1.1rem;
      background-image: linear-gradient(to right, #00aa2a 0%, #00ff41 51%, #00aa2a 100%);
      background-size: 200% auto; background-position: left center;
      border: none; border-radius: 8px; color: #fff;
      font-family: var(--font); font-size: 1rem; letter-spacing: 0.10em;
      cursor: pointer; transition: background-position 0.5s, transform 0.08s;
    }
    #seq-play:hover  { background-position: right center; }
    #seq-play.playing { background-image: linear-gradient(to right, #ff0033 0%, #ff4466 51%, #ff0033 100%); }
    #seq-play:active { transform: scale(0.93); }
    #seq-bpm-wrap {
      display: flex; align-items: center; gap: 0.32rem;
      font-family: var(--font); color: rgba(255,255,255,0.85);
    }
    #seq-bpm-val { font-size: 1.1rem; font-weight: 700; min-width: 2.5ch; text-align: center; }
    .seq-lbl { font-size: 0.68rem; letter-spacing: 0.18em; color: rgba(255,255,255,0.38); }
    .seq-ctrl-btn {
      width: 26px; height: 26px; border-radius: 6px;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.22);
      color: #fff; font-size: 1rem; line-height: 1; cursor: pointer; padding: 0;
      transition: background 0.10s;
    }
    .seq-ctrl-btn:hover { background: rgba(255,255,255,0.22); }
    #seq-clear {
      padding: 0.26rem 0.65rem;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; color: rgba(255,255,255,0.50);
      font-family: var(--font); font-size: 0.78rem; letter-spacing: 0.08em;
      cursor: pointer; transition: background 0.12s, color 0.12s;
    }
    #seq-clear:hover { background: rgba(220,60,60,0.25); color: #fff; }
    #seq-grid  { display: flex; flex-direction: column; gap: 0.24rem; }
    .seq-row   { display: flex; flex-direction: row; align-items: center; gap: 0.18rem; }
    .seq-track-label {
      width: 52px; flex-shrink: 0;
      font-family: var(--font); font-size: 0.60rem; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.40); text-align: right; padding-right: 5px;
    }
    .seq-step {
      flex: 1; height: clamp(26px, 4.2vh, 40px);
      background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.30);
      border-radius: 4px; cursor: pointer; padding: 0;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.45);
      transition: background 0.05s, box-shadow 0.05s;
    }
    .seq-step.g4 { margin-left: 4px; }
    .seq-step.on {
      background: var(--sc); border-color: transparent;
      box-shadow: 0 0 7px 1px var(--sc);
    }
    .seq-step.head { outline: 2.5px solid rgba(255,255,255,0.82); outline-offset: -2px; }
    .seq-step.on.head { filter: brightness(1.35); }

    /* ── Piano — Roland 80s synth style ── */
    #piano-area {
      width: 100%; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: stretch; justify-content: flex-end;
      gap: 0.28rem; padding: 10px 12px 14px;
      background: linear-gradient(155deg, #1e1b2e, #12101e);
      border: 1.5px solid rgba(0,255,65,0.28);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    #synth-brand {
      font-family: 'Courier New', monospace;
      font-size: 0.58rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.85);
      flex-shrink: 0;
    }
    #piano-label {
      font-family: 'Courier New', monospace;
      font-size: clamp(0.58rem, 1.2vh, 0.78rem);
      letter-spacing: 0.16em; color: rgba(180,160,220,0.55); text-align: center; flex-shrink: 0;
    }
    #mini-piano {
      position: relative; display: flex;
      width: 100%; height: clamp(120px, 20vh, 170px);
      user-select: none; touch-action: none;
    }
    .piano-white {
      flex: 1;
      background: linear-gradient(to bottom, #ccc8dc 0%, #c0bcd0 40%, #cac6da 100%);
      border: none; border-right: 1px solid rgba(30,20,50,0.45);
      border-radius: 0 0 4px 4px; cursor: pointer;
      position: relative; z-index: 1; transition: background 0.04s, box-shadow 0.04s;
      box-shadow: inset 0 -6px 10px rgba(0,0,0,0.28), 0 1px 0 rgba(255,255,255,0.25);
    }
    .piano-white:first-child { border-left: 1px solid rgba(30,20,50,0.45); }
    .piano-white.active {
      background: linear-gradient(to bottom, #00ff41, #00aa2a);
      box-shadow: 0 0 20px 6px rgba(0,255,65,0.80), inset 0 -4px 8px rgba(0,0,0,0.20);
    }
    .piano-black {
      position: absolute; top: 0; height: 62%;
      background: linear-gradient(to bottom, #090814 0%, #161228 55%, #0d0b1e 100%);
      border-radius: 0 0 4px 4px; z-index: 2; cursor: pointer;
      transform: translateX(-50%); transition: background 0.04s, box-shadow 0.04s;
      box-shadow: 0 5px 14px rgba(0,0,0,0.90), inset 0 1px 0 rgba(0,255,65,0.10);
    }
    .piano-black.active {
      background: linear-gradient(to bottom, #ff0033, #aa0011);
      box-shadow: 0 0 18px 5px rgba(255,0,51,0.88), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    /* ── Slider PIN overlay ── */
    #spo {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(4,4,14,0.97);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    #spo[hidden] { display: none; }
    #spo-inner { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; }
    #spo-subtitle {
      font-family: 'Barlow Condensed', var(--font);
      font-size: clamp(1.1rem, 2.4vw, 1.7rem);
      letter-spacing: 0.24em; color: rgba(255,255,255,0.40);
    }
    #spo-display {
      font-family: 'Barlow Condensed', var(--font);
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      letter-spacing: 0.12em; color: #fff;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,0,51,0.55);
      border-radius: 16px; padding: 0.8rem 3rem;
      min-width: 320px; text-align: center;
    }
    #spo-display.error { color: #f87171; animation: spo-shake 0.45s ease; }
    #spo-display.ok    { color: #4ade80; }
    @keyframes spo-shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-16px); }
      40% { transform: translateX(16px); }
      60% { transform: translateX(-10px); }
      80% { transform: translateX(10px); }
    }
    #spo-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; width: min(520px, 90vw);
      padding: 1.6rem; border-radius: 24px;
      border: 2px solid rgba(0,255,65,0.55);
      box-shadow: 0 0 24px 8px rgba(0,255,65,0.28), 0 0 60px 20px rgba(0,200,50,0.14);
      animation: pin-glow 2.2s ease-in-out infinite;
    }
    @keyframes pin-glow {
      0%,100% { box-shadow: 0 0 24px 8px rgba(0,255,65,0.28), 0 0 60px 20px rgba(0,200,50,0.14); }
      50%     { box-shadow: 0 0 38px 14px rgba(0,255,65,0.48), 0 0 90px 35px rgba(0,200,50,0.26); }
    }
    .spo-key {
      height: clamp(82px, 13vh, 110px);
      border-radius: 18px;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-family: 'Barlow Condensed', var(--font); font-weight: 600;
      background: rgba(0,10,4,0.72);
      border: 1.5px solid rgba(0,255,65,0.35);
      color: #00ff41; cursor: pointer;
      transition: background 0.12s, transform 0.08s, box-shadow 0.1s;
    }
    .spo-key:hover  { background: rgba(0,255,65,0.16); box-shadow: 0 0 12px 3px rgba(0,255,65,0.45); color: #fff; }
    .spo-key:active { transform: scale(0.88); background: rgba(0,255,65,0.28); }
    .spo-cancel { color: rgba(248,113,113,0.90); border-color: rgba(248,113,113,0.35); font-size: clamp(1.4rem,3.2vw,2.2rem); }
    .spo-del    { font-size: clamp(1.4rem,3.2vw,2.2rem); }
    body.status-open #open-screen  { display: flex; }
    body.status-open #layout       { display: none; }

    #right-title {
      font-size: clamp(2.2rem, 4.4vw, 3.2rem);
      letter-spacing: 0.14em; color: #fff;
      flex-shrink: 0;
    }

    #right-msgs {
      flex: 1; overflow-y: auto; min-height: 0;
      display: flex; flex-direction: column; gap: 0.7rem;
      padding-right: 0.3rem;
    }
    #right-msgs::-webkit-scrollbar { width: 4px; }
    #right-msgs::-webkit-scrollbar-track { background: transparent; }
    #right-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.20); border-radius: 2px; }

    /* Message cards */
    .msg-card {
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 0.85rem 1rem;
    }

    /* ── AMBER SPARK border on unread cards ── */
    .msg-card.unread {
      border: none !important;
      background: rgba(22,14,2,0.72) !important;
      position: relative;
      isolation: isolate;
      animation: none !important;
    }

    .msg-card.unread::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 14px; padding: 2.5px;
      background: conic-gradient(
        from var(--spark-angle),
        rgba(251,191,36,0.18) 0deg,
        rgba(251,191,36,0.55) 80deg,
        rgba(255,220,100,0.90) 105deg,
        rgba(255,255,220,1.00) 115deg,
        rgba(255,200,60,0.80) 125deg,
        rgba(251,191,36,0.22) 160deg,
        rgba(251,191,36,0.22) 290deg,
        rgba(251,191,36,0.75) 320deg,
        rgba(255,230,80,1.00) 343deg,
        rgba(255,255,255,1.00) 352deg,
        rgba(255,180,30,0.90) 358deg,
        rgba(251,191,36,0.18) 360deg
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box,
                    linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spark-rotate 2.2s linear infinite;
      z-index: 1;
    }

    .msg-card.unread::after {
      content: '';
      position: absolute; inset: -8px; border-radius: 22px;
      background: conic-gradient(
        from var(--spark-angle),
        transparent 0deg, transparent 70deg,
        rgba(251,191,36,0.08) 90deg,
        rgba(255,200,60,0.35) 108deg,
        rgba(255,255,160,0.55) 116deg,
        rgba(255,200,60,0.25) 128deg,
        transparent 155deg, transparent 280deg,
        rgba(251,191,36,0.12) 310deg,
        rgba(255,240,100,0.50) 343deg,
        rgba(255,255,220,0.80) 352deg,
        rgba(255,200,60,0.40) 358deg,
        transparent 360deg
      );
      filter: blur(9px); z-index: -1;
      animation: spark-rotate 2.2s linear infinite;
    }

    .msg-card.unread .msg-meta,
    .msg-card.unread .msg-body,
    .msg-card.unread .msg-gelezen-btn,
    .msg-card.unread .msg-delete-btn { position: relative; z-index: 2; }

    .msg-meta {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      font-size: 1.60rem; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.44); margin-bottom: 0.35rem;
    }
    .msg-meta strong { color: rgba(255,255,255,0.90); }

    .msg-delete-btn {
      margin-left: auto; flex-shrink: 0;
      width: 34px; height: 34px;
      background: rgba(248,113,113,0.16);
      border: 1.5px solid rgba(248,113,113,0.40);
      border-radius: 8px; color: #f87171; font-size: 1.15rem;
      cursor: pointer; display: grid; place-items: center;
      transition: background 0.12s, transform 0.1s;
    }
    .msg-delete-btn:active { background: rgba(248,113,113,0.35); transform: scale(0.88); }

    .msg-body {
      font-size: 1.76rem; letter-spacing: 0.03em;
      color: rgba(255,255,255,0.82); line-height: 1.5;
      white-space: pre-wrap; word-break: break-word; margin-bottom: 0.5rem;
    }
    .msg-gelezen-btn {
      padding: 0.35rem 0.9rem; min-height: 38px;
      background: rgba(251,191,36,0.18);
      border: 1.5px solid rgba(251,191,36,0.55);
      border-radius: 8px; color: #fde68a; font-size: 1.50rem;
      letter-spacing: 0.12em; cursor: pointer;
      transition: background 0.12s, transform 0.1s;
    }
    .msg-gelezen-btn:active { background: rgba(251,191,36,0.35); transform: scale(0.93); }

    .right-empty {
      color: rgba(255,255,255,0.28); font-size: 1.8rem;
      letter-spacing: 0.1em; text-align: center; padding: 2rem 0;
    }

    /* ── PIN overlay ── */
    #pin-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    #pin-overlay.visible { opacity: 1; pointer-events: all; }
    #pin-overlay h2 { color:#fff; font-size:1.5rem; letter-spacing:0.14em; margin-bottom:2rem; }
    #pin-dots { display:flex; gap:1.2rem; margin-bottom:2.5rem; }
    .pin-dot { width:20px; height:20px; border-radius:50%; border:2.5px solid rgba(255,255,255,0.38); background:transparent; transition:background .15s,border-color .15s; }
    .pin-dot.filled { background:#fff; border-color:#fff; }
    .pin-dot.error  { background:#f87171; border-color:#f87171; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-14px)} 40%{transform:translateX(12px)} 60%{transform:translateX(-9px)} 80%{transform:translateX(7px)} }
    #pin-dots.shake { animation:shake .42s ease; }
    #pin-keypad { display:grid; grid-template-columns:repeat(3,96px); gap:1rem; }
    .pin-key { width:96px; height:96px; border-radius:50%; border:2px solid rgba(255,255,255,0.16); background:rgba(255,255,255,0.08); color:#fff; font-size:1.8rem; cursor:pointer; display:grid; place-items:center; transition:background .12s,transform .1s; }
    .pin-key:active { background:rgba(255,255,255,0.25); transform:scale(0.90); }
    .pin-key.pin-del    { font-size:1.2rem; color:rgba(255,255,255,0.52); }
    .pin-key.pin-cancel { font-size:0.85rem; color:rgba(255,255,255,0.35); border-color:transparent; background:transparent; }

  <script>
    const NS = 'ict-desk-v1', KEY_S = NS+':status', KEY_M = NS+':messages', KEY_A = NS+':archived', KEY_P = NS+':pin';
    const DEFAULT_PIN = '1234';

    let currentStatus = load(KEY_S, 'closed');
    let messages = load(KEY_M, []);
    let archived = load(KEY_A, []);
    let activeTab = 'inbox';
    let pinBuffer = '', tapCount = 0, tapTimer = null, toastTimer = null;

    applyStatus(currentStatus, false);
    renderRightPanel();

    document.getElementById('school-label').addEventListener('pointerdown', () => {
      tapCount++;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { tapCount = 0; }, 700);
      if (tapCount >= 3) { tapCount = 0; openPin(); }
    });
    document.getElementById('pin-keypad').addEventListener('pointerdown', e => {
      const k = e.target.closest('[data-k]');
      if (k) handlePinKey(k.dataset.k);
    });

    // ── Status ───────────────────────────────────────────────
    function applyStatus(s, animate = true) {
      currentStatus = s; save(KEY_S, s);
      const hu = document.body.classList.contains('has-unread');
      document.body.className = (hu ? 'has-unread ' : '') + 'status-' + s;
      if (animate) {
        const sw = document.getElementById('status-word');
        sw.style.cssText = 'transform:scale(0.88);opacity:0.3;transition:transform .35s,opacity .35s';
        setTimeout(() => { sw.style.cssText = ''; }, 350);
      }
      const isOpen = s === 'open';
      document.getElementById('status-word').textContent = isOpen ? 'OPEN' : 'GESLOTEN';
    }

    function checkUnread() {
      document.body.classList.toggle('has-unread', messages.some(m => !m.read));
    }

    // ── Right panel ──────────────────────────────────────────
    function renderRightPanel() {
      const c = document.getElementById('right-msgs');
      if (!messages.length) {
        c.innerHTML = '<div class="right-empty">Geen berichten</div>';
        checkUnread(); return;
      }
      c.innerHTML = messages.slice().reverse().map(m => `
        <div class="msg-card ${m.read ? '' : 'unread'}" data-msgid="${esc(m.id)}">
          <div class="msg-meta">
            <strong>${esc(m.naam)}</strong><span>${esc(m.lnr)}</span><span>${esc(m.ts)}</span>
            <button class="msg-delete-btn" onclick="deleteFromRight('${esc(m.id)}')" aria-label="Verwijderen">×</button>
          </div>
          <div class="msg-body">${esc(m.bericht)}</div>
          ${!m.read ? `<button class="msg-gelezen-btn" onclick="markOneRead('${esc(m.id)}')">✓ GELEZEN</button>` : ''}
        </div>`).join('');
      checkUnread();
    }

    function markOneRead(id) {
      const m = messages.find(m => m.id === id);
      if (!m) return;
      m.read = true; save(KEY_M, messages);
      const card = document.querySelector(`.msg-card[data-msgid="${id}"]`);
      if (card) {
        card.classList.remove('unread');
        const btn = card.querySelector('.msg-gelezen-btn');
        if (btn) btn.remove();
      }
      checkUnread();
    }
    function deleteFromRight(id) {
      messages = messages.filter(m => m.id !== id);
      save(KEY_M, messages);
      const card = document.querySelector(`.msg-card[data-msgid="${id}"]`);
      if (card) card.remove();
      const c = document.getElementById('right-msgs');
      if (!c.children.length) c.innerHTML = '<div class="right-empty">Geen berichten</div>';
      checkUnread();
      toast('🗑️ VERWIJDERD');

      badge.textContent = unread > 0 ? unread+' NIEUW' : ''; badge.classList.toggle('visible', unread > 0);

    // ── Mini Piano ───────────────────────────────────────────
    let audioCtx = null;
    const _noiseBufs = {};
    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        [0.10, 0.25].forEach(dur => {
          const n = Math.floor(audioCtx.sampleRate * dur);
          const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
          _noiseBufs[dur] = buf;
        });
      }
      return audioCtx;
    }

    // Piano: sine + harmonics, fast attack, natural decay
    function noteOn(freq) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;

      const env = ctx.createGain();
      env.connect(ctx.destination);
      env.gain.setValueAtTime(0.001, now);
      env.gain.linearRampToValueAtTime(0.65, now + 0.006);
      env.gain.exponentialRampToValueAtTime(0.35, now + 0.25);

      const oscs = [];
      [[1, 0.70], [2, 0.28], [3, 0.14], [4, 0.07]].forEach(([mul, amp]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq * mul;
        o.connect(g); g.connect(env); g.gain.value = amp;
        o.start(now); oscs.push(o);
      });

      return { oscs, env };
    }

    function noteOff(note) {
      if (!note) return;
      const ctx = getAudioCtx(), now = ctx.currentTime, rel = 0.45;
      note.env.gain.setValueAtTime(note.env.gain.value, now);
      note.env.gain.exponentialRampToValueAtTime(0.001, now + rel);
      note.oscs.forEach(o => { try { o.stop(now + rel + 0.05); } catch(e){} });
    }

    const PIANO_NOTES = [
      // C4
      { freq:261.63,black:false },{ freq:277.18,black:true, pos:1 },
      { freq:293.66,black:false },{ freq:311.13,black:true, pos:2 },
      { freq:329.63,black:false },
      { freq:349.23,black:false },{ freq:369.99,black:true, pos:4 },
      { freq:392.00,black:false },{ freq:415.30,black:true, pos:5 },
      { freq:440.00,black:false },{ freq:466.16,black:true, pos:6 },
      { freq:493.88,black:false },
      // C5
      { freq:523.25,black:false },{ freq:554.37,black:true, pos:8 },
      { freq:587.33,black:false },{ freq:622.25,black:true, pos:9 },
      { freq:659.25,black:false },
      { freq:698.46,black:false },{ freq:739.99,black:true, pos:11 },
      { freq:783.99,black:false },{ freq:830.61,black:true, pos:12 },
      { freq:880.00,black:false },{ freq:932.33,black:true, pos:13 },
      { freq:987.77,black:false },
      // C6
      { freq:1046.50,black:false },
    ];

    function buildPiano() {
      const container = document.getElementById('mini-piano');
      const whites = PIANO_NOTES.filter(n => !n.black);
      const nW = whites.length; // 15 witte toetsen (C4–C6)

      whites.forEach(note => {
        const k = document.createElement('div');
        k.className = 'piano-white';
        container.appendChild(k);
        addPianoListeners(k, note.freq);
      });

      const bkw = (0.60 / nW * 100).toFixed(3) + '%';
      PIANO_NOTES.filter(n => n.black).forEach(note => {
        const k = document.createElement('div');
        k.className = 'piano-black';
        k.style.left  = (note.pos / nW * 100).toFixed(3) + '%';
        k.style.width = bkw;
        container.appendChild(k);
        addPianoListeners(k, note.freq);
      });
    }

    function addPianoListeners(key, freq) {
      let active = null;
      key.addEventListener('pointerdown', e => {
        e.preventDefault();
        key.classList.add('active');
        noteOff(active);
        active = noteOn(freq);
      });
      const rel = () => { key.classList.remove('active'); noteOff(active); active = null; };
      key.addEventListener('pointerup',     rel);
      key.addEventListener('pointerleave',  rel);
      key.addEventListener('pointercancel', rel);
    }

    buildPiano();

    // ── Drum sounds ──────────────────────────────────────────
    const BEAT = {
      kick: ctx => {
        const now = ctx.currentTime;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.type = 'sine';
        o.frequency.setValueAtTime(160, now); o.frequency.exponentialRampToValueAtTime(35, now+0.45);
        g.gain.setValueAtTime(2.25, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
        o.start(now); o.stop(now+0.5);
      },
      snare: ctx => {
        const now = ctx.currentTime;
        const ns = ctx.createBufferSource(); ns.buffer = _noiseBufs[0.25];
        const nf = ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=2200; nf.Q.value=0.9;
        const ng = ctx.createGain(); ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
        ng.gain.setValueAtTime(1.625, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.22);
        const o = ctx.createOscillator(), og = ctx.createGain();
        o.type='triangle'; o.frequency.value=190; o.connect(og); og.connect(ctx.destination);
        og.gain.setValueAtTime(0.81, now); og.gain.exponentialRampToValueAtTime(0.001, now+0.12);
        ns.start(now); ns.stop(now+0.25); o.start(now); o.stop(now+0.12);
      },
      hihat: ctx => {
        const now = ctx.currentTime;
        const ns = ctx.createBufferSource(); ns.buffer = _noiseBufs[0.10];
        const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=7500;
        const g = ctx.createGain(); ns.connect(f); f.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(1.125, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.09);
        ns.start(now); ns.stop(now+0.10);
      },
      clap: ctx => {
        const now = ctx.currentTime;
        [0, 0.012, 0.024].forEach(off => {
          const ns = ctx.createBufferSource(); ns.buffer = _noiseBufs[0.10];
          const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1100; f.Q.value=0.9;
          const g = ctx.createGain(); ns.connect(f); f.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(1.31, now+off); g.gain.exponentialRampToValueAtTime(0.001, now+off+0.11);
          ns.start(now+off); ns.stop(now+off+0.11);
        });
      },
      tom: ctx => {
        const now = ctx.currentTime;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.type='sine';
        o.frequency.setValueAtTime(110, now); o.frequency.exponentialRampToValueAtTime(55, now+0.35);
        g.gain.setValueAtTime(1.75, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        o.start(now); o.stop(now+0.4);
      },
    };

    // ── Step Sequencer ───────────────────────────────────────
    const SEQ_TRACKS = [
      { id:'kick',  label:'KICK',   color:'rgba(239,68,68,0.82)'  },
      { id:'snare', label:'SNARE',  color:'rgba(234,179,8,0.82)'  },
      { id:'hihat', label:'HI-HAT', color:'rgba(34,197,94,0.82)'  },
      { id:'clap',  label:'CLAP',   color:'rgba(249,115,22,0.82)' },
      { id:'tom',   label:'TOM',    color:'rgba(139,92,246,0.82)' },
    ];
    const SEQ_STEPS = 16;
    let seqPat = SEQ_TRACKS.map(() => Array(SEQ_STEPS).fill(false));
    let seqRunning = false, seqCurStep = 0, seqBpm = 120, seqTimer = null, seqNextTime = 0;

    function seqBuild() {
      const grid = document.getElementById('seq-grid');
      grid.innerHTML = '';
      SEQ_TRACKS.forEach((trk, t) => {
        const row = document.createElement('div');
        row.className = 'seq-row';
        const lbl = document.createElement('div');
        lbl.className = 'seq-track-label'; lbl.textContent = trk.label;
        row.appendChild(lbl);
        for (let s = 0; s < SEQ_STEPS; s++) {
          const btn = document.createElement('button');
          btn.className = 'seq-step' + (s % 4 === 0 ? ' g4' : '');
          btn.style.setProperty('--sc', trk.color);
          btn.dataset.t = t; btn.dataset.s = s;
          if (seqPat[t][s]) btn.classList.add('on');
          row.appendChild(btn);
        }
        grid.appendChild(row);
      });
      seqUpdateHead(seqRunning ? seqCurStep : -1);
    }

    function seqUpdateHead(step) {
      document.querySelectorAll('.seq-step').forEach(btn => {
        btn.classList.toggle('head', +btn.dataset.s === step);
      });
    }

    function seqTick() {
      const ctx = getAudioCtx();
      SEQ_TRACKS.forEach((trk, t) => {
        if (seqPat[t][seqCurStep]) BEAT[trk.id](ctx);
      });
      seqUpdateHead(seqCurStep);
      seqCurStep = (seqCurStep + 1) % SEQ_STEPS;
      seqNextTime += (60 / seqBpm / 4) * 1000;
      seqTimer = setTimeout(seqTick, Math.max(0, seqNextTime - performance.now()));
    }

    function seqStart() {
      seqRunning = true; seqCurStep = 0;
      seqNextTime = performance.now();
      const btn = document.getElementById('seq-play');
      btn.textContent = '■ STOP'; btn.classList.add('playing');
      seqTick();
    }

    function seqStop() {
      seqRunning = false;
      clearTimeout(seqTimer); seqTimer = null;
      seqUpdateHead(-1);
      const btn = document.getElementById('seq-play');
      if (btn) { btn.textContent = '▶ PLAY'; btn.classList.remove('playing'); }
    }

    document.getElementById('seq-play').addEventListener('click', () => {
      seqRunning ? seqStop() : seqStart();
    });
    document.getElementById('seq-bpm-up').addEventListener('click', () => {
      seqBpm = Math.min(200, seqBpm + 5);
      document.getElementById('seq-bpm-val').textContent = seqBpm;
    });
    document.getElementById('seq-bpm-dn').addEventListener('click', () => {
      seqBpm = Math.max(60, seqBpm - 5);
      document.getElementById('seq-bpm-val').textContent = seqBpm;
    });
    document.getElementById('seq-clear').addEventListener('click', () => {
      seqPat = SEQ_TRACKS.map(() => Array(SEQ_STEPS).fill(false));
      seqBuild();
    });
    document.getElementById('seq-grid').addEventListener('pointerdown', e => {
      const btn = e.target.closest('.seq-step');
      if (!btn) return;
      const t = +btn.dataset.t, s = +btn.dataset.s;
      seqPat[t][s] = !seqPat[t][s];
      btn.classList.toggle('on', seqPat[t][s]);
      if (seqPat[t][s]) BEAT[SEQ_TRACKS[t].id](getAudioCtx());
    });

    // Stop sequencer when leaving OPEN state
    new MutationObserver(() => {
      if (!document.body.classList.contains('status-open') && seqRunning) seqStop();
    }).observe(document.body, { attributes: true, attributeFilter: ['class'] });

    seqBuild();

    // ── Screen wake lock ─────────────────────────────────────
    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => {
            wakeLock = null;
            setTimeout(requestWakeLock, 3000);
          });
        }
      } catch (_) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    // ── Deurbel — melodisch belgeluid (~2.5 sec) ────────────
    function playDoorbell() {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      // C-majeur pentatonisch, sine + sub, belachtig decay
      const notes = [
        [523.25,0.20],[659.25,0.20],[783.99,0.20],[1046.5,0.38],
        [0,0.08],
        [783.99,0.16],[659.25,0.16],[523.25,0.52],
      ];
      let t = now;
      notes.forEach(([freq, dur]) => {
        if (freq === 0) { t += dur; return; }
        [[freq, 0.30], [freq/2, 0.13]].forEach(([f, vol]) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = 'sine'; o.frequency.value = f;
          o.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(vol, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.40);
          o.start(t); o.stop(t + dur + 0.45);
        });
        t += dur;
      });
    }

    // ── White swirl screensaver animation ───────────────────
    (function() {
      const cvs = document.getElementById('swirl-canvas');
      const cx  = cvs.getContext('2d');
      let W, H, t = 0;

      function resize() {
        W = cvs.width  = window.innerWidth;
        H = cvs.height = window.innerHeight;
        cx.fillStyle = 'rgba(0,0,0,1)';
        cx.fillRect(0, 0, W, H);
      }
      window.addEventListener('resize', resize);
      resize();

      function draw() {
        cx.fillStyle = 'rgba(0,0,0,0.018)';
        cx.fillRect(0, 0, W, H);

        const ox = W * 0.5, oy = H * 0.5;
        const rx = W * 0.40, ry = H * 0.36;
        const steps = 420;

        cx.beginPath();
        for (let i = 0; i <= steps; i++) {
          const a = (i / steps) * Math.PI * 2;
          const x = ox + rx * Math.sin(3 * a + t);
          const y = oy + ry * Math.sin(2 * a + t * 0.7);
          i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
        }
        cx.strokeStyle = 'rgba(255,255,255,0.55)';
        cx.lineWidth = 1.2;
        cx.stroke();

        cx.beginPath();
        for (let i = 0; i <= steps; i++) {
          const a = (i / steps) * Math.PI * 2;
          const x = ox + rx * 0.62 * Math.sin(5 * a - t * 1.3);
          const y = oy + ry * 0.62 * Math.sin(4 * a + t * 0.5);
          i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
        }
        cx.strokeStyle = 'rgba(255,255,255,0.28)';
        cx.lineWidth = 0.8;
        cx.stroke();

        t += 0.0055;
        requestAnimationFrame(draw);
      }

      draw();
    })();

  </script>


</body>
